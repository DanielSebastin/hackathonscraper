<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Hackathon Agent</title>
    <meta name="description"
        content="Discover the most relevant hackathons for you using AI-powered semantic search." />
    <link rel="icon" href="icon.png" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap"
        rel="stylesheet" />
    <link rel="stylesheet" href="style.css?v=3" />
</head>

<body>

    <!-- ── Sidebar ─────────────────────────────────────────────── -->
    <aside class="sidebar" aria-label="Navigation">

        <!-- Logo mark -->
        <div class="sidebar-logo" aria-label="Hackathon Agent">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2">
                <path d="M13 2L3 14h9l-1 8 10-12h-9l1-8z" />
            </svg>
        </div>

        <!-- Search -->
        <button id="navSearch" class="nav-icon active" title="Search" aria-label="Search" onclick="showSearchView()">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <circle cx="11" cy="11" r="8" />
                <path d="M21 21l-4.35-4.35" />
            </svg>
        </button>

        <!-- Saved -->
        <button id="navSaved" class="nav-icon" title="Saved" aria-label="Saved hackathons" onclick="showSavedView()">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M19 21l-7-5-7 5V5a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2z" />
            </svg>
            <span id="savedBadge" class="nav-badge" style="display:none" aria-label="Saved count">0</span>
        </button>

        <div class="sidebar-spacer"></div>

        <button class="nav-icon" title="Settings" aria-label="Settings">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <circle cx="12" cy="12" r="3" />
                <path
                    d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z" />
            </svg>
        </button>

    </aside>

    <!-- ── Main ────────────────────────────────────────────────── -->
    <main class="main">

        <!-- Topbar -->
        <div class="topbar">
            <div class="topbar-left">
                <h1>Hackathon Agent</h1>
                <p>Find events by topic, theme, or location using natural language</p>
            </div>
            <div class="topbar-right">
                <div class="status-dot">
                    <span class="dot" aria-hidden="true"></span>
                    API live
                </div>
            </div>
        </div>

        <!-- Content -->
        <div class="content">

            <!-- ── Search view ── -->
            <div id="searchView">

                <div class="search-row" role="search">
                    <div class="search-wrap">
                        <svg class="search-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                            aria-hidden="true">
                            <circle cx="11" cy="11" r="8" />
                            <path d="M21 21l-4.35-4.35" />
                        </svg>
                        <input id="searchInput" type="search"
                            placeholder='e.g. "AI hackathon in Chennai" or "hardware design competition"'
                            autocomplete="off" aria-label="Search hackathons" />
                    </div>
                    <button id="searchBtn" onclick="doSearch()" aria-label="Run search">Search</button>
                </div>

                <div class="chips" id="chips" role="list" aria-label="Quick search suggestions">
                    <span class="chip" role="listitem" onclick="chipSearch(this)">AI and Machine Learning</span>
                    <span class="chip" role="listitem" onclick="chipSearch(this)">Web Development</span>
                    <span class="chip" role="listitem" onclick="chipSearch(this)">Hardware Hackathon</span>
                    <span class="chip" role="listitem" onclick="chipSearch(this)">Ideathon 2026</span>
                    <span class="chip" role="listitem" onclick="chipSearch(this)">Healthcare Technology</span>
                    <span class="chip" role="listitem" onclick="chipSearch(this)">Cybersecurity</span>
                </div>

                <div class="llm-card" id="llmCard" aria-live="polite">
                    <div class="llm-label">
                        <svg width="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"
                            aria-hidden="true">
                            <path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5" />
                        </svg>
                        AI Summary
                    </div>
                    <p class="llm-text" id="llmText"></p>
                </div>

                <div class="stats-bar" id="statsBar" style="display:none" aria-live="polite">
                    <span>Found <span class="count" id="resultCount">0</span> results</span>
                    <span class="sep">·</span>
                    <span id="queryLabel"></span>
                </div>

                <div class="results-grid" id="results" role="region" aria-label="Search results"></div>
            </div>

            <!-- ── Saved view ── -->
            <div id="savedView" style="display:none">
                <div class="stats-bar" style="margin-bottom:20px">
                    <span class="count">Saved Hackathons</span>
                </div>
                <div class="results-grid" id="savedResults" role="region" aria-label="Saved hackathons"></div>
            </div>

        </div>
    </main>

    <script src="app.js?v=3"></script>
</body>

</html>
